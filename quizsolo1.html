<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiz de Solos</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#10194d,#1f2f8f);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.quiz-container{
    width:100%;
    max-width:750px;
    background:#111b5a;
    border:3px solid #00d4ff;
    border-radius:25px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:2rem;
}

.subtitulo{
    text-align:center;
    opacity:0.8;
    margin-bottom:25px;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    gap:10px;
    flex-wrap:wrap;
}

.info-box{
    background:#0c1448;
    padding:12px 18px;
    border-radius:15px;
    font-weight:bold;
}

.progresso{
    width:100%;
    height:16px;
    background:#0c1448;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
}

.progresso-barra{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00d4ff,#7d5fff);
    transition:0.4s;
}

.pergunta{
    font-size:1.5rem;
    font-weight:bold;
    margin-bottom:25px;
    line-height:1.4;
}

.alternativas{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.alternativa{
    background:#b30000;
    border:none;
    color:white;
    padding:18px;
    border-radius:15px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
    transition:0.3s;
}

.alternativa:hover{
    transform:scale(1.02);
}

.correta{
    background:#00a86b !important;
}

.errada{
    background:#444 !important;
}

.botoes{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:25px;
}

.botao{
    flex:1;
    padding:15px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    font-size:1rem;
    transition:0.3s;
}

.proximo{
    background:linear-gradient(90deg,#00d4ff,#7d5fff);
    color:white;
}

.ajuda{
    background:#ff9800;
    color:white;
}

.botao:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

.resultado{
    text-align:center;
}

.resultado h2{
    font-size:2rem;
    margin-bottom:20px;
}

.resultado p{
    font-size:1.3rem;
    margin-bottom:20px;
}

.reiniciar{
    background:linear-gradient(90deg,#00d4ff,#7d5fff);
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:15px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
}

@media(max-width:600px){

    .pergunta{
        font-size:1.2rem;
    }

    .alternativa{
        font-size:0.95rem;
    }

}
</style>
</head>

<body>

                Pontos: 0
            </div>
        </div>

        </div>

        <div class="pergunta" id="pergunta"></div>

        <div class="alternativas" id="alternativas"></div>

        <div class="botoes">
            <button class="botao ajuda" id="eliminarBtn">
                Eliminar 2 alternativas
            </button>

            <button class="botao ajuda" id="pularBtn">
                Pular pergunta
            </button>

            <button class="botao proximo" id="proximoBtn" disabled>
                Próxima questão
            </button>
        </div>

    </div>

let questoes = [];
let indice = 0;
let pontos = 0;
let respondeu = false;

let usouEliminar = false;
let usouPular = false;

const perguntaEl = document.getElementById("pergunta");
const alternativasEl = document.getElementById("alternativas");
const contadorEl = document.getElementById("contador");
const pontuacaoEl = document.getElementById("pontuacao");
const barraEl = document.getElementById("barra");

const proximoBtn = document.getElementById("proximoBtn");
const eliminarBtn = document.getElementById("eliminarBtn");
const pularBtn = document.getElementById("pularBtn");

function embaralhar(array){
    return array.sort(() => Math.random() - 0.5);
}

function iniciarQuiz(){

    questoes = embaralhar([...bancoQuestoes]).slice(0,10);

    questoes.forEach(q => {
        q.alternativas = embaralhar(q.alternativas);
    });

    indice = 0;
    pontos = 0;
    respondeu = false;

    usouEliminar = false;
    usouPular = false;

    eliminarBtn.disabled = false;
    pularBtn.disabled = false;

    mostrarQuestao();
}

function mostrarQuestao(){

    respondeu = false;

    proximoBtn.disabled = true;

    const questao = questoes[indice];

    contadorEl.innerHTML = `Questão ${indice+1}/10`;

    pontuacaoEl.innerHTML = `Pontos: ${pontos}`;

    barraEl.style.width = `${((indice)/10)*100}%`;

    perguntaEl.innerHTML = questao.pergunta;

    alternativasEl.innerHTML = "";

    questao.alternativas.forEach(alternativa => {

        const btn = document.createElement("button");

        btn.classList.add("alternativa");

        btn.innerHTML = alternativa;

        btn.onclick = () => verificarResposta(btn, alternativa);

        alternativasEl.appendChild(btn);

    });

}

function verificarResposta(botao, resposta){

    if(respondeu) return;

    respondeu = true;

    const correta = questoes[indice].correta;

    const botoes = document.querySelectorAll(".alternativa");

    botoes.forEach(btn => {

        if(btn.innerHTML === correta){
            btn.classList.add("correta");
        }else{
            btn.classList.add("errada");
        }

        btn.disabled = true;
    });

    if(resposta === correta){
        pontos++;
        pontuacaoEl.innerHTML = `Pontos: ${pontos}`;
    }

    proximoBtn.disabled = false;
}

proximoBtn.addEventListener("click", () => {

    indice++;

    if(indice < 10){
        mostrarQuestao();
    }else{
        mostrarResultado();
    }

});

function mostrarResultado(){

    barraEl.style.width = "100%";

    document.getElementById("quiz").innerHTML = `

        <div class="resultado">

            <h2>🎉 Quiz Finalizado!</h2>

            <p>Você acertou <strong>${pontos}</strong> de 10 questões.</p>

            <button class="reiniciar" onclick="location.reload()">
                Jogar novamente
            </button>

        </div>

    `;
}

eliminarBtn.addEventListener("click", () => {

    if(usouEliminar) return;

    usouEliminar = true;

    eliminarBtn.disabled = true;

    const correta = questoes[indice].correta;

    const botoes = [...document.querySelectorAll(".alternativa")];

    const erradas = botoes.filter(btn => btn.innerHTML !== correta);

    const embaralhadas = embaralhar(erradas).slice(0,2);

    embaralhadas.forEach(btn => {
        btn.style.visibility = "hidden";
        btn.disabled = true;
    });

});

pularBtn.addEventListener("click", () => {

    if(usouPular) return;

    usouPular = true;

    pularBtn.disabled = true;

    indice++;

    if(indice < 10){
        mostrarQuestao();
    }else{
        mostrarResultado();
    }

});

iniciarQuiz();

</script>

</html>
