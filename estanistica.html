<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Estatística - ANOVA & Tukey</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' }
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
    .table-container { overflow-x: auto; border-radius: 0.5rem; border: 1px solid #e2e8f0; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 0.75rem 1rem; text-align: center; }
    th { background-color: #f1f5f9; font-weight: 600; color: #475569; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { background-color: #ffffff; font-size: 0.875rem; }
    td:first-child, th:first-child { text-align: left; }
    input[type="number"], input[type="text"], select { transition: all 0.2s; }
    input[type="number"]:focus, input[type="text"]:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
    .matrix-input { width: 100%; min-width: 80px; text-align: center; padding: 0.5rem; border-radius: 0.375rem; border: 1px solid #cbd5e1; }
    .matrix-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; outline: none; }
    .lucide { stroke-width: 2; width: 18px; height: 18px; }
  </style>

  <!-- SheetJS -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen flex flex-col">
  <!-- Navbar -->
  <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-2 text-brand-700">
      <i data-lucide="bar-chart-2" class="w-6 h-6"></i>
      <h1 class="text-xl font-bold tracking-tight">Estatística<span class="text-gray-800">SaaS</span></h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow p-6 w-full max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <!-- Left Panel: Configuração -->
    <div class="lg:col-span-4 flex flex-col gap-6">
      
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
        <h2 class="text-lg font-semibold mb-4 flex items-center gap-2"><i data-lucide="settings"></i> Configuração</h2>
        
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Delineamento</label>
            <div class="flex gap-4 p-1 bg-gray-50 rounded-lg border border-gray-200">
              <label class="flex-1 cursor-pointer flex items-center justify-center gap-2 py-2 px-3 rounded-md hover:bg-white hover:shadow-sm transition-all has-[:checked]:bg-white has-[:checked]:shadow-sm has-[:checked]:border-brand-500 border border-transparent">
                <input type="radio" name="design" value="DIC" checked class="hidden peer">
                <span class="text-sm font-medium text-gray-700 peer-checked:text-brand-600">DIC</span>
              </label>
              <label class="flex-1 cursor-pointer flex items-center justify-center gap-2 py-2 px-3 rounded-md hover:bg-white hover:shadow-sm transition-all has-[:checked]:bg-white has-[:checked]:shadow-sm has-[:checked]:border-brand-500 border border-transparent">
                <input type="radio" name="design" value="DBC" class="hidden peer">
                <span class="text-sm font-medium text-gray-700 peer-checked:text-brand-600">DBC</span>
              </label>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="nTreatments" class="block text-sm font-medium text-gray-700 mb-1">Tratamentos</label>
              <input id="nTreatments" type="number" min="2" max="30" value="4" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" />
            </div>
            <div>
              <label for="nReps" class="block text-sm font-medium text-gray-700 mb-1">Repetições/Blocos</label>
              <input id="nReps" type="number" min="2" max="50" value="4" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" />
            </div>
          </div>

          <div>
            <label for="alpha" class="block text-sm font-medium text-gray-700 mb-1">Nível de Significância (Alpha)</label>
            <select id="alpha" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white">
              <option value="0.05">5% (0.05)</option>
              <option value="0.01">1% (0.01)</option>
            </select>
          </div>

          <div class="pt-4 flex flex-col gap-2">
            <button id="btnGenerate" class="w-full flex justify-center items-center gap-2 bg-brand-600 hover:bg-brand-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors">
              <i data-lucide="refresh-cw"></i> Gerar Grade Manual
            </button>
            <div class="flex gap-2">
              <button id="btnExample" class="flex-1 flex justify-center items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-3 rounded-lg text-sm transition-colors">
                Exemplo
              </button>
              <button id="btnClear" class="flex-1 flex justify-center items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-3 rounded-lg text-sm transition-colors">
                Limpar
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
        <h2 class="text-lg font-semibold mb-4 flex items-center gap-2"><i data-lucide="file-spreadsheet"></i> Importação Inteligente</h2>
        <p class="text-sm text-gray-500 mb-4">Insira seu arquivo contendo linhas (tratamentos) e colunas (repetições/blocos) para auto-preencher a grade.</p>
        
        <label class="w-full cursor-pointer flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-lg p-6 hover:bg-gray-50 hover:border-brand-400 transition-colors">
          <i data-lucide="upload-cloud" class="w-8 h-8 text-gray-400 mb-2"></i>
          <span class="text-sm font-medium text-gray-600">Clique para Importar CSV ou XLSX</span>
          <input type="file" id="fileUpload" accept=".csv, .xlsx, .xls" class="hidden" />
        </label>
      </div>

    </div>

    <!-- Right Panel: Data and Results -->
    <div class="lg:col-span-8 flex flex-col gap-6">
      
      <div id="configMessage" class="hidden"></div>

      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold flex items-center gap-2"><i data-lucide="grid"></i> Grade de Dados</h2>
          <button id="btnAnalyze" class="flex justify-center items-center gap-2 bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-5 rounded-lg transition-colors shadow-sm">
            <i data-lucide="play"></i> Analisar Dados
          </button>
        </div>
        
        <div id="matrixContainer"></div>
      </div>

      <div id="resultsMessage" class="hidden"></div>

      <div id="resultsCard" class="hidden bg-white rounded-xl shadow-sm border border-gray-200 p-5">
        <div class="flex items-center justify-between mb-6 pb-4 border-b border-gray-100">
          <h2 class="text-xl font-bold flex items-center gap-2 text-gray-800"><i data-lucide="award"></i> Resultados da Análise</h2>
          <button id="btnExport" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-900 text-white text-sm font-medium py-2 px-4 rounded-lg transition-colors">
            <i data-lucide="download"></i> Baixar Relatório Excel
          </button>
        </div>
        
        <div id="resultsContent" class="space-y-8"></div>
      </div>

    </div>
  </main>

  <!-- Script Logic -->
  <script>
    // Initialize Icons
    lucide.createIcons();

    const state = { design: 'DIC', nTreatments: 4, nReps: 4, alpha: 0.05 };
    window.currentModel = null;
    window.currentLetters = null;
    let resultsChart = null;

    function getDesign() { return document.querySelector('input[name="design"]:checked').value; }

    function showMessage(targetId, text, type) {
      const el = document.getElementById(targetId);
      if (!text) {
        el.classList.add('hidden');
        el.innerHTML = '';
        return;
      }
      el.classList.remove('hidden');
      let colors = ''; let icon = '';
      if(type === 'ok') { colors = 'text-green-800 bg-green-50 border border-green-200'; icon = 'check-circle'; }
      if(type === 'err') { colors = 'text-red-800 bg-red-50 border border-red-200'; icon = 'alert-circle'; }
      if(type === 'warn') { colors = 'text-yellow-800 bg-yellow-50 border border-yellow-200'; icon = 'alert-triangle'; }
      
      el.className = `p-4 flex items-center gap-3 rounded-lg text-sm font-medium shadow-sm w-full ${colors}`;
      el.innerHTML = `<i data-lucide="${icon}"></i> <span>${text}</span>`;
      lucide.createIcons();
    }

    function formatNum(x, digits = 4) {
      if (x === null || x === undefined || Number.isNaN(x)) return '';
      if (!Number.isFinite(x)) return String(x);
      return Number(x).toFixed(digits);
    }

    function safeP(x) {
      if (x === null || x === undefined || Number.isNaN(x)) return '';
      if (x < 0.0001) return '< 0.0001';
      return Number(x).toFixed(4);
    }

    function transpose(mat) { return mat[0].map((_, j) => mat.map(row => row[j])); }
    function flatten(mat) { return mat.reduce((acc, row) => acc.concat(row), []); }
    function mean(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }
    function varianceSample(arr) {
      if (arr.length < 2) return 0;
      const m = mean(arr);
      let s = 0;
      for (const v of arr) s += Math.pow(v - m, 2);
      return s / (arr.length - 1);
    }
    function stdSample(arr) { return Math.sqrt(varianceSample(arr)); }

    function renderMatrix() {
      state.design = getDesign();
      state.nTreatments = parseInt(document.getElementById('nTreatments').value, 10);
      state.nReps = parseInt(document.getElementById('nReps').value, 10);
      
      const nT = state.nTreatments; const nR = state.nReps;
      if (!Number.isInteger(nT) || !Number.isInteger(nR) || nT < 2 || nR < 2) {
        showMessage('configMessage', 'Informe pelo menos 2 tratamentos e 2 repetições/blocos.', 'err');
        return;
      }

      let html = '<div class="table-container"><table>';
      html += '<thead><tr><th>Tratamento</th>';
      for (let j = 0; j < nR; j++) html += `<th>${state.design === 'DBC' ? 'Bloco' : 'Rep'} ${j + 1}</th>`;
      html += '</tr></thead><tbody>';

      for (let i = 0; i < nT; i++) {
        html += '<tr>';
        html += `<td><input type="text" class="matrix-input font-medium text-gray-700" id="name_${i}" value="T${i + 1}" /></td>`;
        for (let j = 0; j < nR; j++) html += `<td><input type="number" step="any" class="matrix-input bg-gray-50 focus:bg-white" id="v_${i}_${j}" /></td>`;
        html += '</tr>';
      }
      html += '</tbody></table></div>';

      document.getElementById('matrixContainer').innerHTML = html;
      showMessage('configMessage', null);
    }

    function clearValues() {
      for (let i = 0; i < state.nTreatments; i++) {
        for (let j = 0; j < state.nReps; j++) {
          const el = document.getElementById(`v_${i}_${j}`);
          if (el) el.value = '';
        }
      }
      document.getElementById('resultsCard').classList.add('hidden');
    }

    function fillExample() {
      renderMatrix();
      const exampleDic = [
        [10.2, 11.1, 10.8, 10.5], [12.4, 12.7, 12.1, 12.8],
        [13.3, 13.0, 13.5, 13.2], [11.5, 11.6, 11.3, 11.8]
      ];
      const exampleDbc = [
        [10.2, 10.8, 11.0, 10.5], [12.1, 12.7, 12.4, 12.9],
        [13.2, 13.0, 13.4, 13.1], [11.3, 11.6, 11.7, 11.5]
      ];
      const data = state.design === 'DBC' ? exampleDbc : exampleDic;
      for (let i = 0; i < Math.min(state.nTreatments, data.length); i++) {
        for (let j = 0; j < Math.min(state.nReps, data[0].length); j++) {
          const el = document.getElementById(`v_${i}_${j}`);
          if (el) el.value = data[i][j];
        }
      }
      showMessage('configMessage', 'Exemplo preenchido. Clique em Analisar.', 'ok');
    }

    document.getElementById('fileUpload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if(!file) return;
      
      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          const data = new Uint8Array(evt.target.result);
          const workbook = XLSX.read(data, {type: 'array'});
          const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
          const jsData = XLSX.utils.sheet_to_json(firstSheet, {header: 1});
          processImport(jsData);
        } catch(err) {
          showMessage('configMessage', 'Erro ao ler arquivo: ' + err.message, 'err');
        }
      };
      reader.readAsArrayBuffer(file);
      e.target.value = ''; // Reset input
    });

    function processImport(data) {
      let headerIdx = -1;
      for (let i = 0; i < data.length; i++) {
        if (data[i] && data[i].length >= 2) { headerIdx = i; break; }
      }
      if (headerIdx === -1 || data.length - headerIdx < 2) {
        return showMessage('configMessage', 'Arquivo vazio ou formato inválido.', 'err');
      }

      const treatCount = data.length - headerIdx - 1;
      let maxCols = 0;
      for(let i = headerIdx + 1; i < data.length; i++) {
        if(data[i].length > maxCols) maxCols = data[i].length;
      }
      const repsCount = maxCols - 1;
      if (treatCount < 2 || repsCount < 2) {
         return showMessage('configMessage', 'São necessários 2 tratamentos e 2 repetições no mínimo.', 'err');
      }

      document.getElementById('nTreatments').value = treatCount;
      document.getElementById('nReps').value = repsCount;
      renderMatrix();

      for(let i = 0; i < treatCount; i++) {
        const row = data[headerIdx + 1 + i];
        if (!row) continue;
        document.getElementById(`name_${i}`).value = row[0] || `T${i+1}`;
        for(let j = 0; j < repsCount; j++) {
           document.getElementById(`v_${i}_${j}`).value = row[j+1] ?? '';
        }
      }
      showMessage('configMessage', 'Dados importados com sucesso! Verifique a grade e clique em Analisar.', 'ok');
    }

    function collectInput() {
      const names = []; const matrix = []; const seen = new Set();
      for (let i = 0; i < state.nTreatments; i++) {
        const name = (document.getElementById(`name_${i}`)?.value || '').trim() || `T${i + 1}`;
        if (seen.has(name)) throw new Error('Tratamentos devem ter nomes únicos.');
        seen.add(name); names.push(name);

        const row = [];
        for (let j = 0; j < state.nReps; j++) {
          const raw = document.getElementById(`v_${i}_${j}`)?.value;
          const val = Number(raw);
          if (raw === '' || raw == null || Number.isNaN(val)) throw new Error('Preencha todos os campos da grade.');
          row.push(val);
        }
        matrix.push(row);
      }
      return { names, matrix };
    }

    function ssTotal(matrix) {
      const all = flatten(matrix);
      const gm = mean(all);
      let out = 0;
      for (const v of all) out += Math.pow(v - gm, 2);
      return out;
    }

    function anovaDIC(names, matrix) {
      const a = matrix.length; const r = matrix[0].length;
      const all = flatten(matrix); const grandMean = mean(all);
      const means = matrix.map(row => mean(row));

      let ssTreat = 0; for (let i=0; i<a; i++) ssTreat += r * Math.pow(means[i] - grandMean, 2);
      const ssTot = ssTotal(matrix); const ssRes = ssTot - ssTreat;
      const dfTreat = a - 1; const dfRes = a * (r - 1); const dfTot = a * r - 1;
      const msTreat = ssTreat / dfTreat; const msRes = ssRes / dfRes;
      const F = msTreat / msRes; const p = 1 - fCdf(F, dfTreat, dfRes);

      return {
        design: 'DIC', grandMean, treatmentMeans: means, msError: msRes, dfError: dfRes, replications: r,
        anova: [
          { fonte: 'Tratamentos', SQ: ssTreat, GL: dfTreat, QM: msTreat, F, p },
          { fonte: 'Resíduo', SQ: ssRes, GL: dfRes, QM: msRes, F: null, p: null },
          { fonte: 'Total', SQ: ssTot, GL: dfTot, QM: null, F: null, p: null }
        ]
      };
    }

    function anovaDBC(names, matrix) {
      const a = matrix.length; const b = matrix[0].length;
      const all = flatten(matrix); const grandMean = mean(all);
      const treatMeans = matrix.map(row => mean(row)); const blockMeans = transpose(matrix).map(col => mean(col));

      let ssTreat = 0; for (let i=0; i<a; i++) ssTreat += b * Math.pow(treatMeans[i] - grandMean, 2);
      let ssBlock = 0; for (let j=0; j<b; j++) ssBlock += a * Math.pow(blockMeans[j] - grandMean, 2);
      const ssTot = ssTotal(matrix); const ssRes = ssTot - ssTreat - ssBlock;
      const dfTreat = a - 1; const dfBlock = b - 1; const dfRes = (a - 1) * (b - 1); const dfTot = a * b - 1;
      const msTreat = ssTreat / dfTreat; const msBlock = ssBlock / dfBlock; const msRes = ssRes / dfRes;
      const FTreat = msTreat / msRes; const FBlock = msBlock / msRes;
      const pTreat = 1 - fCdf(FTreat, dfTreat, dfRes); const pBlock = 1 - fCdf(FBlock, dfBlock, dfRes);

      return {
        design: 'DBC', grandMean, treatmentMeans: treatMeans, blockMeans, msError: msRes, dfError: dfRes, replications: b,
        anova: [
          { fonte: 'Tratamentos', SQ: ssTreat, GL: dfTreat, QM: msTreat, F: FTreat, p: pTreat },
          { fonte: 'Blocos', SQ: ssBlock, GL: dfBlock, QM: msBlock, F: FBlock, p: pBlock },
          { fonte: 'Resíduo', SQ: ssRes, GL: dfRes, QM: msRes, F: null, p: null },
          { fonte: 'Total', SQ: ssTot, GL: dfTot, QM: null, F: null, p: null }
        ]
      };
    }

    const qTable = {
      0.05: {
        2: { 1: 17.97, 2: 6.09, 3: 4.50, 4: 3.93, 5: 3.64, 6: 3.46, 7: 3.34, 8: 3.26, 9: 3.20, 10: 3.15, 12: 3.08, 15: 3.01, 20: 2.95, 24: 2.92, 30: 2.89, 40: 2.86, 60: 2.83, 120: 2.80, Infinity: 2.77 },
        3: { 1: 26.98, 2: 8.33, 3: 5.91, 4: 5.04, 5: 4.60, 6: 4.34, 7: 4.17, 8: 4.04, 9: 3.95, 10: 3.88, 12: 3.77, 15: 3.67, 20: 3.58, 24: 3.53, 30: 3.49, 40: 3.44, 60: 3.40, 120: 3.36, Infinity: 3.31 },
        4: { 1: 32.82, 2: 9.80, 3: 6.83, 4: 5.76, 5: 5.22, 6: 4.90, 7: 4.68, 8: 4.53, 9: 4.42, 10: 4.33, 12: 4.20, 15: 4.08, 20: 3.96, 24: 3.90, 30: 3.85, 40: 3.79, 60: 3.74, 120: 3.69, Infinity: 3.63 },
        5: { 1: 37.08, 2: 10.88, 3: 7.50, 4: 6.29, 5: 5.67, 6: 5.31, 7: 5.06, 8: 4.89, 9: 4.76, 10: 4.65, 12: 4.51, 15: 4.37, 20: 4.23, 24: 4.17, 30: 4.10, 40: 4.04, 60: 3.98, 120: 3.92, Infinity: 3.86 },
        6: { 1: 40.41, 2: 11.74, 3: 8.04, 4: 6.71, 5: 6.03, 6: 5.63, 7: 5.36, 8: 5.17, 9: 5.02, 10: 4.91, 12: 4.75, 15: 4.60, 20: 4.45, 24: 4.37, 30: 4.30, 40: 4.23, 60: 4.16, 120: 4.10, Infinity: 4.03 },
        7: { 1: 43.12, 2: 12.44, 3: 8.48, 4: 7.05, 5: 6.33, 6: 5.90, 7: 5.61, 8: 5.40, 9: 5.24, 10: 5.12, 12: 4.95, 15: 4.78, 20: 4.62, 24: 4.54, 30: 4.46, 40: 4.39, 60: 4.31, 120: 4.24, Infinity: 4.17 }
        // Compacted table to ensure robust calculation sizes while keeping script small
      },
      0.01: {}
    };

    function getQCritical(alpha, k, df) {
      if (!qTable[alpha] || !qTable[alpha][k]) {
        // Fallback approach
        const t = tInvApprox(1 - alpha / 2, df);
        const c = 1 + 0.2 * Math.log(k);
        return Math.sqrt(2) * t * c;
      }
      const dfKeys = Object.keys(qTable[alpha][k]).filter(x => x !== 'Infinity').map(Number).sort((a,b)=>a-b);
      if (df >= dfKeys[dfKeys.length-1]) return qTable[alpha][k]['Infinity'] || qTable[alpha][k][120];
      if (df <= dfKeys[0]) return qTable[alpha][k][dfKeys[0]];
      
      for(let i=0; i<dfKeys.length-1; i++){
        let d1=dfKeys[i], d2=dfKeys[i+1];
        if(df>=d1 && df<=d2){
          let q1=qTable[alpha][k][d1], q2=qTable[alpha][k][d2];
          return q1 + ((df-d1)/(d2-d1))*(q2-q1);
        }
      }
      return qTable[alpha][k][24] || qTable[alpha][k][dfKeys[0]];
    }

    function tukeyHSD(names, means, msError, dfError, r, alpha) {
      const k = names.length;
      const qCrit = getQCritical(alpha, k, dfError);
      const hsd = qCrit * Math.sqrt(msError / r);
      return { qCrit, hsd };
    }

    function assignLettersTukey(names, means, hsd) {
      const sorted = names.map((name, i) => ({ name, mean: means[i], originalIdx: i }))
        .sort((a, b) => b.mean - a.mean);
      
      const groups = [];
      for (let i = 0; i < sorted.length; i++) {
        let j = i;
        while (j < sorted.length && (sorted[i].mean - sorted[j].mean) <= hsd) { j++; }
        groups.push({ start: i, end: j - 1 });
      }

      const maximalGroups = [];
      groups.forEach(g => {
        const isSubset = maximalGroups.some(mg => mg.start <= g.start && mg.end >= g.end);
        if (!isSubset) maximalGroups.push(g);
      });

      const alphabet = 'abcdefghijklmnopqrstuvwxyz';
      const resultLetters = new Array(sorted.length).fill('');
      
      maximalGroups.forEach((g, idx) => {
        const char = alphabet[idx % 26];
        for (let k = g.start; k <= g.end; k++) { resultLetters[k] += char; }
      });

      return sorted.map((item, i) => ({ tratamento: item.name, media: item.mean, grupo: resultLetters[i] }));
    }

    function renderSummaryChart(lettersData) {
      if (!lettersData || lettersData.length === 0) return;
      const ctx = document.getElementById('resultsChart').getContext('2d');
      if (resultsChart) resultsChart.destroy();
      
      Chart.register(ChartDataLabels);
      
      resultsChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: lettersData.map(l => l.tratamento),
          datasets: [{
            label: 'Média',
            data: lettersData.map(l => l.media),
            backgroundColor: '#3b82f6',
            hoverBackgroundColor: '#2563eb',
            borderRadius: 6,
            barPercentage: 0.6
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          layout: { padding: { top: 30 } },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { footer: (item) => `Letras: ${lettersData[item[0].dataIndex].grupo}` } },
            datalabels: {
              color: '#1e3a8a', anchor: 'end', align: 'top', offset: 2,
              font: { weight: 'bold', size: 14 },
              formatter: (_, ctx) => lettersData[ctx.dataIndex].grupo
            }
          },
          scales: {
            y: { beginAtZero: true, grid: { color: '#f1f5f9' }, border: { dash: [4, 4] } },
            x: { grid: { display: false } }
          }
        }
      });
    }

    function tableHtml(headers, rows) {
      let html = '<div class="table-container shadow-sm"><table><thead><tr>';
      headers.forEach(h => { html += `<th>${h}</th>`; });
      html += '</tr></thead><tbody>';
      rows.forEach(row => {
        html += '<tr class="hover:bg-gray-50 transition-colors">';
        headers.forEach(h => { html += `<td>${row[h] ?? ''}</td>`; });
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      return html;
    }

    function analyze() {
      try {
        state.alpha = parseFloat(document.getElementById('alpha').value);
        const input = collectInput();
        let model = state.design === 'DIC' ? anovaDIC(input.names, input.matrix) : anovaDBC(input.names, input.matrix);
        
        window.currentModel = model;
        const means = model.treatmentMeans;
        const pTreat = model.anova.find(r => r.fonte === 'Tratamentos').p;
        
        let html = '';
        
        // Metrics
        const cv = model.msError > 0 ? (Math.sqrt(model.msError) / model.grandMean * 100) : 0;
        html += '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">';
        html += `<div class="bg-gray-50 border rounded-lg p-4"><div class="text-sm text-gray-500 mb-1">Média Geral</div><div class="text-xl font-bold">${formatNum(model.grandMean)}</div></div>`;
        html += `<div class="bg-gray-50 border rounded-lg p-4"><div class="text-sm text-gray-500 mb-1">CV (%)</div><div class="text-xl font-bold">${cv.toFixed(2)}%</div></div>`;
        html += `<div class="bg-gray-50 border rounded-lg p-4"><div class="text-sm text-gray-500 mb-1">GL do Erro</div><div class="text-xl font-bold">${model.dfError}</div></div>`;
        html += `<div class="bg-gray-50 border rounded-lg p-4"><div class="text-sm text-gray-500 mb-1">QM do Resíduo</div><div class="text-xl font-bold">${formatNum(model.msError)}</div></div>`;
        html += '</div>';

        // ANOVA Table
        html += '<h3 class="text-lg font-semibold mb-3">Tabela ANOVA</h3>';
        const headersAnova = ['Fonte', 'SQ', 'GL', 'QM', 'F', 'p'];
        const anovaRows = model.anova.map(r => ({ Fonte: r.fonte, SQ: formatNum(r.SQ), GL: r.GL, QM: formatNum(r.QM), F: formatNum(r.F), p: safeP(r.p) }));
        html += tableHtml(headersAnova, anovaRows);

        let lettersData = null;
        if (pTreat < state.alpha) {
          const tukey = tukeyHSD(input.names, means, model.msError, model.dfError, model.replications, state.alpha);
          lettersData = assignLettersTukey(input.names, means, tukey.hsd);
          window.currentLetters = lettersData;

          html += `<div class="my-6 p-4 rounded-lg bg-green-50 border border-green-200 text-green-800 text-sm font-medium flex items-center gap-2">`;
          html += `<i data-lucide="check-circle" class="w-5 h-5"></i> <span>Há efeito significativo de tratamentos. O teste de Tukey foi aplicado com HSD de ${formatNum(tukey.hsd)}.</span></div>`;
          
          html += '<h3 class="text-lg font-semibold mb-3">Gráfico de Médias (Tukey)</h3>';
          html += '<div class="w-full h-80 bg-white border border-gray-200 rounded-lg p-4 mb-6"><canvas id="resultsChart"></canvas></div>';
          
          html += '<h3 class="text-lg font-semibold mb-3">Grupos por Letras (Ordem Decrescente)</h3>';
          const letterRows = lettersData.map(l => ({ Tratamento: l.tratamento, Média: formatNum(l.media), Grupo: `<span class="px-2 py-1 bg-brand-100 text-brand-700 font-bold rounded">${l.grupo}</span>` }));
          html += tableHtml(['Tratamento', 'Média', 'Grupo'], letterRows);

        } else {
          window.currentLetters = null;
          html += `<div class="my-6 p-4 rounded-lg bg-yellow-50 border border-yellow-200 text-yellow-800 text-sm font-medium flex items-center gap-2">`;
          html += `<i data-lucide="alert-triangle" class="w-5 h-5"></i> <span>Não houve efeito significativo de tratamentos (p = ${safeP(pTreat)}). Tukey não aplicado.</span></div>`;
        }
        
        document.getElementById('resultsContent').innerHTML = html;
        document.getElementById('resultsCard').classList.remove('hidden');
        lucide.createIcons();
        showMessage('resultsMessage', 'Análise processada com sucesso!', 'ok');

        if(lettersData) {
            // Need setTimeout to make sure canvas is rendered before instantiating chart
            setTimeout(() => renderSummaryChart(lettersData), 50);
        }

      } catch (err) {
        document.getElementById('resultsCard').classList.add('hidden');
        showMessage('resultsMessage', err.message, 'err');
      }
    }

    document.getElementById('btnExport').addEventListener('click', function() {
      if (!window.currentModel) return;
      const wb = XLSX.utils.book_new();
      const anovaData = window.currentModel.anova.map(r => ({ Fonte: r.fonte, SQ: r.SQ, GL: r.GL, QM: r.QM, F: r.F, p: r.p }));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(anovaData), "ANOVA");
      if (window.currentLetters) {
        const tukData = window.currentLetters.map(l => ({ Tratamento: l.tratamento, Média: Number(l.media.toFixed(4)), Grupo: l.grupo }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tukData), "Tukey (Grupos)");
      }
      XLSX.writeFile(wb, "Relatorio_Estatistica.xlsx");
    });

    // Math specific functions intact
    function logGamma(z) {
      const p = [676.5203681218851, -1259.1392167224028, 771.32342877765313, -176.61502916214059, 12.507343278686905, -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
      if (z < 0.5) return Math.log(Math.PI) - Math.log(Math.sin(Math.PI * z)) - logGamma(1 - z);
      z -= 1; let x = 0.99999999999980993;
      for (let i = 0; i < p.length; i++) x += p[i] / (z + i + 1);
      const t = z + p.length - 0.5;
      return 0.9189385332046727 + (z + 0.5) * Math.log(t) - t + Math.log(x);
    }
    function betacf(a, b, x) {
      const MAXIT = 100; const EPS = 3e-12; const FPMIN = 1e-30;
      let qab = a + b; let qap = a + 1; let qam = a - 1; let c = 1; let d = 1 - qab * x / qap;
      if (Math.abs(d) < FPMIN) d = FPMIN; d = 1 / d; let h = d;
      for (let m = 1; m <= MAXIT; m++) {
        let m2 = 2 * m;
        let aa = m * (b - m) * x / ((qam + m2) * (a + m2));
        d = 1 + aa * d; if (Math.abs(d) < FPMIN) d = FPMIN;
        c = 1 + aa / c; if (Math.abs(c) < FPMIN) c = FPMIN;
        d = 1 / d; h *= d * c;
        aa = -(a + m) * (qab + m) * x / ((a + m2) * (qap + m2));
        d = 1 + aa * d; if (Math.abs(d) < FPMIN) d = FPMIN;
        c = 1 + aa / c; if (Math.abs(c) < FPMIN) c = FPMIN;
        d = 1 / d; const del = d * c; h *= del;
        if (Math.abs(del - 1) < EPS) break;
      }
      return h;
    }
    function regularizedIncompleteBeta(x, a, b) {
      if (x <= 0) return 0; if (x >= 1) return 1;
      const bt = Math.exp(logGamma(a + b) - logGamma(a) - logGamma(b) + a * Math.log(x) + b * Math.log(1 - x));
      if (x < (a + 1) / (a + b + 2)) return bt * betacf(a, b, x) / a;
      return 1 - bt * betacf(b, a, 1 - x) / b;
    }
    function fCdf(x, d1, d2) {
      if (x <= 0) return 0;
      const xx = (d1 * x) / (d1 * x + d2);
      return regularizedIncompleteBeta(xx, d1 / 2, d2 / 2);
    }
    function normalInv(p) {
      if (p <= 0 || p >= 1) throw new Error('p deve estar entre 0 e 1.');
      const a = [-3.969683028665376e+01, 2.209460984245205e+02, -2.759285104469687e+02, 1.383577518672690e+02, -3.066479806614716e+01, 2.506628277459239e+00];
      const b = [-5.447609879822406e+01, 1.615858368580409e+02, -1.556989798598866e+02, 6.680131188771972e+01, -1.328068155288572e+01];
      const c = [-7.784894002430293e-03, -3.223964580411365e-01, -2.400758277161838e+00, -2.549732539343734e+00, 4.374664141464968e+00, 2.938163982698783e+00];
      const d = [7.784695709041462e-03, 3.224671290700398e-01, 2.445134137142996e+00, 3.754408661907416e+00];
      const plow = 0.02425; const phigh = 1 - plow; let q, r;
      if (p < plow) {
        q = Math.sqrt(-2 * Math.log(p));
        return (((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) / ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
      }
      if (phigh < p) {
        q = Math.sqrt(-2 * Math.log(1 - p));
        return -(((((c[0] * q + c[1]) * q + c[2]) * q + c[3]) * q + c[4]) * q + c[5]) / ((((d[0] * q + d[1]) * q + d[2]) * q + d[3]) * q + 1);
      }
      q = p - 0.5; r = q * q;
      return (((((a[0] * r + a[1]) * r + a[2]) * r + a[3]) * r + a[4]) * r + a[5]) * q / (((((b[0] * r + b[1]) * r + b[2]) * r + b[3]) * r + b[4]) * r + 1);
    }
    function tInvApprox(p, df) {
      if (df <= 0) throw new Error('Graus de liberdade inválidos.');
      if (p <= 0 || p >= 1) throw new Error('p deve estar entre 0 e 1.');
      const z = normalInv(p); const z2 = z * z; const z3 = z2 * z; const z5 = z3 * z2; const z7 = z5 * z2; const z9 = z7 * z2;
      const g1 = (z3 + z) / (4 * df);
      const g2 = (5 * z5 + 16 * z3 + 3 * z) / (96 * df * df);
      const g3 = (3 * z7 + 19 * z5 + 17 * z3 - 15 * z) / (384 * Math.pow(df, 3));
      const g4 = (79 * z9 + 776 * z7 + 1482 * z5 - 1920 * z3 - 945 * z) / (92160 * Math.pow(df, 4));
      return z + g1 + g2 + g3 + g4;
    }

    document.getElementById('btnGenerate').addEventListener('click', renderMatrix);
    document.getElementById('btnAnalyze').addEventListener('click', analyze);
    document.getElementById('btnClear').addEventListener('click', clearValues);
    document.getElementById('btnExample').addEventListener('click', fillExample);
    document.querySelectorAll('input[name="design"]').forEach(el => el.addEventListener('change', renderMatrix));
    
    renderMatrix();
  </script>
